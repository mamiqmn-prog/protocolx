<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ProtoX — AI Asistan</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #020408;
    --surface: #0a0f1a;
    --surface2: #0f1824;
    --border: #1a2840;
    --accent: #00d4ff;
    --accent2: #0066ff;
    --text: #e8f4ff;
    --muted: #4a6080;
    --danger: #ff3366;
    --success: #00ff88;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Rajdhani', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: 
      linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }
  header {
    position: relative;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 24px;
    background: rgba(10,15,26,0.9);
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(20px);
  }
  .logo {
    font-family: 'Orbitron', monospace;
    font-size: 1.1rem;
    font-weight: 900;
    letter-spacing: 2px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-decoration: none;
  }
  .logo span { -webkit-text-fill-color: var(--danger); }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .plan-badge {
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 1px;
    padding: 4px 10px;
    border-radius: 20px;
    text-transform: uppercase;
  }
  .plan-badge.free {
    background: rgba(74,96,128,0.2);
    border: 1px solid var(--muted);
    color: var(--muted);
  }
  .plan-badge.pro {
    background: linear-gradient(135deg, rgba(0,212,255,0.15), rgba(0,102,255,0.15));
    border: 1px solid var(--accent);
    color: var(--accent);
  }
  .limit-counter { font-size: 0.75rem; color: var(--muted); font-family: 'Orbitron', monospace; }
  .limit-counter span { color: var(--accent); }
  .btn-upgrade {
    font-family: 'Orbitron', monospace;
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 1px;
    padding: 6px 14px;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    border: none;
    border-radius: 4px;
    color: #000;
    cursor: pointer;
    text-decoration: none;
  }
  .btn-logout {
    font-size: 0.75rem;
    color: var(--muted);
    background: none;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 5px 10px;
    cursor: pointer;
  }
  .btn-contact {
    font-size: 0.75rem;
    color: var(--muted);
    background: none;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 5px 10px;
    text-decoration: none;
  }
  .btn-contact:hover { color: var(--accent); border-color: var(--accent); }
  .chat-container {
    position: relative;
    z-index: 1;
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    scroll-behavior: smooth;
  }
  .welcome {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    text-align: center;
    gap: 16px;
  }
  .welcome-icon {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    overflow: hidden;
    border: 2px solid var(--accent);
    animation: pulse 2s infinite;
  }
  .welcome-icon img { width: 100%; height: 100%; object-fit: cover; }
  @keyframes pulse {
    0%,100% { box-shadow: 0 0 0 0 rgba(0,212,255,0.3); }
    50% { box-shadow: 0 0 20px 4px rgba(0,212,255,0.1); }
  }
  .welcome h2 {
    font-family: 'Orbitron', monospace;
    font-size: 1.4rem;
    font-weight: 700;
    letter-spacing: 2px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .welcome p { color: var(--muted); font-size: 1rem; max-width: 320px; line-height: 1.6; }
  .suggestions { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; max-width: 500px; margin-top: 8px; }
  .suggestion-chip {
    font-size: 0.8rem;
    padding: 8px 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--text);
    cursor: pointer;
  }
  .message {
    display: flex;
    gap: 12px;
    animation: slideUp 0.3s ease;
    max-width: 800px;
    width: 100%;
    margin: 0 auto;
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .message.user { flex-direction: row-reverse; }
  .avatar {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.7rem;
    flex-shrink: 0;
    font-family: 'Orbitron', monospace;
    font-weight: 700;
  }
  .message.user .avatar { background: linear-gradient(135deg, var(--accent2), var(--accent)); color: #000; }
  .message.ai .avatar { background: var(--surface2); border: 1px solid var(--border); color: var(--accent); }
  .bubble {
    padding: 12px 16px;
    border-radius: 12px;
    font-size: 0.95rem;
    line-height: 1.6;
    max-width: calc(100% - 60px);
  }
  .message.user .bubble {
    background: linear-gradient(135deg, rgba(0,102,255,0.2), rgba(0,212,255,0.1));
    border: 1px solid rgba(0,212,255,0.2);
    border-radius: 12px 2px 12px 12px;
  }
  .message.ai .bubble {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 2px 12px 12px 12px;
  }
  .typing { display: flex; gap: 4px; align-items: center; padding: 4px 0; }
  .typing span {
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
    animation: typing 1.2s infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes typing {
    0%,60%,100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-6px); opacity: 1; }
  }
  .input-area {
    position: relative;
    z-index: 10;
    padding: 16px 24px 8px;
    background: rgba(10,15,26,0.95);
    border-top: 1px solid var(--border);
    backdrop-filter: blur(20px);
  }
  .input-wrapper {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    max-width: 800px;
    margin: 0 auto;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 14px;
  }
  .input-wrapper:focus-within { border-color: var(--accent); }
  #messageInput {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    font-size: 1rem;
    resize: none;
    min-height: 24px;
    max-height: 120px;
    line-height: 1.5;
  }
  #messageInput::placeholder { color: var(--muted); }
  #sendBtn {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    border: none;
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  #sendBtn:disabled { opacity: 0.4; cursor: not-allowed; }
  #sendBtn svg { width: 16px; height: 16px; fill: #000; }
  .input-footer {
    text-align: center;
    margin-top: 8px;
    font-size: 0.7rem;
    color: var(--muted);
    max-width: 800px;
    margin-left: auto;
    margin-right: auto;
  }
  .limit-warning {
    display: none;
    text-align: center;
    padding: 12px 20px;
    background: rgba(255,51,102,0.1);
    border: 1px solid rgba(255,51,102,0.3);
    border-radius: 8px;
    color: var(--danger);
    font-size: 0.85rem;
    max-width: 500px;
    margin: 0 auto 12px;
  }
  .limit-warning a { color: var(--accent); text-decoration: none; font-weight: 600; }
</style>
</head>
<body>
<header>
  <a href="index.html" class="logo">PROTO<span>X</span></a>
  <div class="header-right">
    <span class="limit-counter" id="limitDisplay"><span id="usedCount">0</span>/10</span>
    <span class="plan-badge free" id="planBadge">FREE</span>
    <a href="pricing.html" class="btn-upgrade" id="upgradeBtn">UPGRADE</a>
    <a href="contact.html" class="btn-contact" style="font-size:0.65rem;padding:4px 8px;">İletişim</a>
<button class="btn-logout" onclick="logout()" style="color:#ff3366;border-color:#ff3366;padding:4px 8px;font-size:0.75rem;">→</button>
  </div>
</header>
<div class="chat-container" id="chatContainer">
  <div class="welcome" id="welcomeScreen">
    <div class="welcome-icon">
      <img src="Black Navy Futuristic Modern Cybersecurity Presentation (1).jpg" alt="ProtoX" onerror="this.parentElement.innerHTML='🤖'">
    </div>
    <h2>PROTOX</h2>
    <p>Teknoloji, yazılım ve siber güvenlik hakkında her şeyi sorabileceğin asistanın.</p>
    <div class="suggestions">
      <div class="suggestion-chip" onclick="sendSuggestion('Yapay zeka nedir?')">Yapay zeka nedir?</div>
      <div class="suggestion-chip" onclick="sendSuggestion('Python nasıl öğrenirim?')">Python nasıl öğrenirim?</div>
      <div class="suggestion-chip" onclick="sendSuggestion('Siber güvenlik nedir?')">Siber güvenlik nedir?</div>
      <div class="suggestion-chip" onclick="sendSuggestion('Web sitesi nasıl yapılır?')">Web sitesi nasıl yapılır?</div>
    </div>
  </div>
</div>
<div class="input-area">
  <div class="limit-warning" id="limitWarning">
    Günlük ücretsiz limitine ulaştın! <a href="pricing.html">Pro'ya geç</a>
  </div>
  <div class="input-wrapper">
    <textarea id="messageInput" placeholder="ProtoX'e bir şey sor..." rows="1"></textarea>
    <button id="sendBtn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2 21L23 12 2 3v7l15 2-15 2v7z"/></svg>
    </button>
  </div>
  <div class="input-footer">ProtoX yapay zeka hata yapabilir.</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/app.js"></script>
</body>
  </html>
