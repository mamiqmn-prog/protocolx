<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ProtoX — Giris</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #020408; --surface: #0a0f1a; --surface2: #0f1824;
    --border: #1a2840; --accent: #00d4ff; --accent2: #0066ff;
    --text: #e8f4ff; --muted: #4a6080; --danger: #ff3366;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Rajdhani', sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; display: flex;
    align-items: center; justify-content: center;
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image: linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px; pointer-events: none;
  }
  .card {
    position: relative; z-index: 1; width: 100%; max-width: 400px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 40px 32px; margin: 20px;
    animation: fadeUp 0.6s ease;
  }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  .logo {
    font-family: 'Orbitron', monospace; font-size: 1.5rem; font-weight: 900;
    letter-spacing: 3px; text-align: center; margin-bottom: 8px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .logo span { -webkit-text-fill-color: var(--danger); }
  .subtitle { text-align: center; color: var(--muted); font-size: 0.85rem; letter-spacing: 1px; margin-bottom: 32px; }
  .tabs { display: flex; background: var(--surface2); border-radius: 8px; padding: 4px; margin-bottom: 24px; }
  .tab {
    flex: 1; padding: 8px; text-align: center;
    font-family: 'Orbitron', monospace; font-size: 0.7rem; letter-spacing: 1px;
    cursor: pointer; border-radius: 6px; transition: all 0.2s;
    color: var(--muted); border: none; background: none;
  }
  .tab.active { background: linear-gradient(135deg, var(--accent2), var(--accent)); color: #000; font-weight: 700; }
  .form-group { margin-bottom: 16px; }
  label { display: block; font-size: 0.8rem; letter-spacing: 1px; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; }
  input {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; padding: 12px 14px; color: var(--text);
    font-family: 'Rajdhani', sans-serif; font-size: 1rem; outline: none; transition: border-color 0.2s;
  }
  input:focus { border-color: var(--accent); }
  input::placeholder { color: var(--muted); }
  .btn-primary {
    width: 100%; padding: 13px;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    border: none; border-radius: 8px; color: #000;
    font-family: 'Orbitron', monospace; font-size: 0.8rem; font-weight: 700;
    letter-spacing: 2px; cursor: pointer; margin-top: 8px;
  }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .error-msg {
    background: rgba(255,51,102,0.1); border: 1px solid rgba(255,51,102,0.3);
    border-radius: 6px; padding: 10px 12px; color: var(--danger);
    font-size: 0.85rem; margin-bottom: 16px; display: none;
  }
  .success-msg {
    background: rgba(0,255,136,0.1); border: 1px solid rgba(0,255,136,0.3);
    border-radius: 6px; padding: 10px 12px; color: #00ff88;
    font-size: 0.85rem; margin-bottom: 16px; display: none;
  }
</style>
</head>
<body>
<div class="card">
  <div class="logo">PROTO<span>X</span></div>
  <div class="subtitle">AI ASISTAN PLATFORMU</div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('login', event)">GIRIS YAP</button>
    <button class="tab" onclick="switchTab('register', event)">KAYIT OL</button>
  </div>
  <div id="errorMsg" class="error-msg"></div>
  <div id="successMsg" class="success-msg"></div>
  <div id="loginForm">
    <div class="form-group">
      <label>E-Posta</label>
      <input type="email" id="loginEmail" placeholder="ornek@email.com">
    </div>
    <div class="form-group">
      <label>Sifre</label>
      <input type="password" id="loginPassword" placeholder="••••••••">
    </div>
    <button class="btn-primary" onclick="login()" id="loginBtn">GIRIS YAP</button>
  </div>
  <div id="registerForm" style="display:none;">
    <div class="form-group">
      <label>E-Posta</label>
      <input type="email" id="regEmail" placeholder="ornek@email.com">
    </div>
    <div class="form-group">
      <label>Sifre</label>
      <input type="password" id="regPassword" placeholder="En az 6 karakter">
    </div>
    <button class="btn-primary" onclick="register()" id="registerBtn">KAYIT OL</button>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/app.js"></script>
<script>
  function switchTab(tab, event) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    event.target.classList.add('active');
    document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
    document.getElementById('registerForm').style.display = tab === 'register' ? 'block' : 'none';
    document.getElementById('errorMsg').style.display = 'none';
    document.getElementById('successMsg').style.display = 'none';
  }
  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg; el.style.display = 'block';
    document.getElementById('successMsg').style.display = 'none';
  }
  function showSuccess(msg) {
    const el = document.getElementById('successMsg');
    el.textContent = msg; el.style.display = 'block';
    document.getElementById('errorMsg').style.display = 'none';
  }
  async function login() {
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    if (!email || !password) return showError('Tum alanlari doldur!');
    document.getElementById('loginBtn').disabled = true;
    document.getElementById('loginBtn').textContent = 'GIRIS...';
    const { error } = await supabase.auth.signInWithPassword({ email, password });
    if (error) {
      showError('Hatali email veya sifre!');
      document.getElementById('loginBtn').disabled = false;
      document.getElementById('loginBtn').textContent = 'GIRIS YAP';
    } else { window.location.href = 'index.html'; }
  }
  async function register() {
    const email = document.getElementById('regEmail').value.trim();
    const password = document.getElementById('regPassword').value;
    if (!email || !password) return showError('Tum alanlari doldur!');
    if (password.length < 6) return showError('Sifre en az 6 karakter olmali!');
    document.getElementById('registerBtn').disabled = true;
    document.getElementById('registerBtn').textContent = 'KAYIT...';
    const { error } = await supabase.auth.signUp({ email, password });
    if (error) {
      showError('Kayit basarisiz: ' + error.message);
    } else {
      showSuccess('Kayit basarili! Email onayini kontrol et.');
    }
    document.getElementById('registerBtn').disabled = false;
    document.getElementById('registerBtn').textContent = 'KAYIT OL';
  }
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      const loginVisible = document.getElementById('loginForm').style.display !== 'none';
      if (loginVisible) login(); else register();
    }
  });
</script>
</body>
</html>
